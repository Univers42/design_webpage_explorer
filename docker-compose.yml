# ============================================================================
# Design Explorer — a gallery of AI-built websites.
#
# Each site lives in its OWN directory with its OWN Dockerfile. This compose
# file at the repo root builds and runs them one at a time. Nothing is ever
# installed on the host — only Docker is required.
#
#   Dev (hot reload):    docker compose up lithos --build
#                        -> http://localhost:5173
#   Production (nginx):  docker compose --profile prod up lithos-prod --build
#                        -> http://localhost:8080
#   Stop everything:     docker compose down
# ============================================================================

name: design-explorer

services:
  # ----- Lithos: geology brand hero — dev server with hot module reload -----
  lithos:
    build:
      context: ./lithos
      target: dev
    container_name: lithos-dev
    ports:
      - "5173:5173"
    volumes:
      - ./lithos:/app                          # live source -> instant HMR
      - lithos_node_modules:/app/node_modules  # keep the image's installed deps
    environment:
      - CHOKIDAR_USEPOLLING=true               # reliable file watching in Docker
    restart: unless-stopped

  # ----- Lithos: production build, served as static files by nginx -----
  lithos-prod:
    profiles: ["prod"]
    build:
      context: ./lithos
      target: prod
    container_name: lithos-prod
    ports:
      - "8080:80"
    restart: unless-stopped

  # ----- Mainframe: creative agency hero — dev server with hot module reload -----
