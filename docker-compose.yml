      - mainframe_node_modules:/app/node_modules  # keep the image's installed deps
    environment:
      - CHOKIDAR_USEPOLLING=true                  # reliable file watching in Docker
    restart: unless-stopped

  # ----- Mainframe: production build, served as static files by nginx -----
  mainframe-prod:
    profiles: ["prod"]
    build:
      context: ./mainframe
      target: prod
    container_name: mainframe-prod
    ports:
      - "8081:80"
    restart: unless-stopped

  # ----- Cursor Follow: "Core Features" section — dev server with hot reload -----
